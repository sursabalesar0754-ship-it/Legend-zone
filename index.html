<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legend Zone | Official Premium Download</title>
    <!-- प्रीमियम फ़ॉन्ट्स और आइकन्स -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0c20 100%);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            perspective: 1000px;
        }
        /* बैकग्राउंड में नियॉन इफ़ेक्ट के लिए ग्लोब */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: #00f2fe;
            filter: blur(150px);
            opacity: 0.2;
            top: 10%;
            left: 20%;
            z-index: 0;
        }
        body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: #4facfe;
            filter: blur(150px);
            opacity: 0.2;
            bottom: 10%;
            right: 20%;
            z-index: 0;
        }
        .premium-card {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7), 
                        inset 0 0 20px rgba(255, 255, 255, 0.05);
            max-width: 480px;
            width: 100%;
            text-align: center;
            z-index: 1;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        .premium-card:hover {
            border-color: rgba(0, 242, 254, 0.5);
            box-shadow: 0 25px 60px rgba(0, 242, 254, 0.15), 0 20px 50px rgba(0, 0, 0, 0.7);
        }
        .badge {
            display: inline-block;
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            color: #000;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 12px;
            padding: 6px 16px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }
        .logo-container {
            width: 90px;
            height: 90px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(0, 242, 254, 0.4);
            border-radius: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            font-size: 42px;
            animation: pulse 2s infinite alternate;
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(45deg, #fff 30%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }
        p {
            font-size: 16px;
            color: #a0aec0;
            line-height: 1.6;
            margin-bottom: 35px;
            font-weight: 500;
        }
        .download-btn {
            display: block;
            width: 100%;
            padding: 18px;
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }
        .download-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: 0.5s;
        }
        .download-btn:hover::before {
            left: 100%;
        }
        .download-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 35px rgba(0, 242, 254, 0.7);
        }
        .download-btn:active {
            transform: translateY(-2px);
        }
        .footer-stats {
            margin-top: 40px;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 25px;
        }
        .stat-box h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            color: #00f2fe;
            margin-bottom: 5px;
        }
        .stat-box p {
            font-size: 12px;
            color: #718096;
            margin-bottom: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 242, 254, 0.4); }
            100% { transform: scale(1.05); box-shadow: 0 0 20px 10px rgba(0, 242, 254, 0); }
        }
    </style>
</head>
<body>

    <div class="premium-card">
        <span class="badge">Verified Secure</span>
        <div class="logo-container">⚡</div>
        <h1>LEGEND ZONE</h1>
        <p>अनुभव करें बेहतरीन गेमिंग परफॉर्मेंस का। नीचे दिए गए सिक्योर प्रीमियम लिंक से सीधे ऑफिशियल एंड्रॉइड ऐप इंस्टॉल करें।</p>
        
        <!-- आपका वर्किंग डायरेक्ट डाउनलोड लिंक यहाँ सेट है -->
        <a href="https://drive.google.com/uc?export=download&id=1rmK3MPaFhmuyKL9PiFDa4kmO9_DSwjeK" class="download-btn">
            Download APK
        </a>

        <div class="footer-stats">
            <div class="stat-box">
                <h3>V1.0.2</h3>
                <p>Version</p>
            </div>
            <div class="stat-box">
                <h3>Secure</h3>
                <p>Google Drive</p>
            </div>
            <div class="stat-box">
                <h3>Android</h3>
                <p>OS Supported</p>
            </div>
        </div>
    </div>

</body>
</html>
